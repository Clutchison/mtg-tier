<div class="app-shell">
  <h1>Magic: The Gathering Tier Builder</h1>

  <form class="set-form" (submit)="$event.preventDefault(); loadSet()">
    <label for="setCode">Set code</label>
    <input id="setCode" [(ngModel)]="setCode" name="setCode" placeholder="e.g. mh3" maxlength="8" />
    <button type="submit" [disabled]="loading">{{ loading ? 'Loading...' : 'Load Set' }}</button>
  </form>

  <section class="filters" *ngIf="poolCards.length > 0">
    <fieldset>
      <legend>Filter by color</legend>
      <div class="checkbox-group">
        <label class="checkbox-option" *ngFor="let color of colorOptions">
          <input
            type="checkbox"
            [checked]="isColorSelected(color)"
            (change)="onColorToggle(color, $any($event.target).checked)" />
          <span>{{ color }}</span>
        </label>
      </div>
    </fieldset>

    <fieldset>
      <legend>Filter by rarity</legend>
      <div class="checkbox-group">
        <label class="checkbox-option" *ngFor="let rarity of rarityOptions">
          <input
            type="checkbox"
            [checked]="isRaritySelected(rarity)"
            (change)="onRarityToggle(rarity, $any($event.target).checked)" />
          <span>{{ rarity | titlecase }}</span>
        </label>
      </div>
    </fieldset>
  </section>

  <p class="error" *ngIf="error">{{ error }}</p>

  <section class="tiers">
    <div
      class="tier-row"
      *ngFor="let tier of tiers; trackBy: trackById"
      (dragover)="onContainerDragOver($event, 'tier', tier.id)"
      (drop)="dropOnTier($event, tier.id)">
      <div class="tier-header">
        <input [(ngModel)]="tier.name" [name]="'tier-' + tier.id" />
      </div>

      <div class="tier-cards">
        <div class="drop-indicator" *ngIf="showDropIndicator('tier', 0, tier.id)"></div>
        <div
          class="card"
          *ngFor="let card of tier.cards; trackBy: trackById"
          draggable="true"
          (dragstart)="onCardDragStart($event, 'tier', card.id, tier.id)"
          (dragend)="onCardDragEnd()"
          (mousedown)="onCardMouseDown()"
          (mouseup)="onCardMouseUp()"
          (mouseenter)="onCardMouseEnter($event, card)"
          (mousemove)="onCardMouseMove($event)"
          (mouseleave)="onCardMouseLeave()"
          (dragover)="onCardDragOver($event, 'tier', card.id, tier.id)"
          (drop)="dropOnTier($event, tier.id)">
          <img *ngIf="card.imageUrl" [src]="card.imageUrl" [alt]="card.name" loading="lazy" />
          <span>{{ card.name }}</span>
        </div>
        <div class="drop-indicator" *ngIf="showDropIndicator('tier', tier.cards.length, tier.id)"></div>
      </div>
    </div>
  </section>

  <div class="board-actions">
    <button class="add-tier" type="button" (click)="addTier()">+ Add Tier</button>
    <button type="button" class="reset-board" (click)="resetBoard()">Reset Board</button>
    <button type="button" class="export-board" (click)="exportBoard()">Export JSON</button>
    <label class="import-board">
      Import JSON
      <input type="file" accept="application/json" (change)="importBoard($event)" />
    </label>
  </div>

  <h2>Card Pool</h2>
  <div class="pool" (dragover)="onContainerDragOver($event, 'pool')" (drop)="dropOnPool($event)">
    <div class="drop-indicator" *ngIf="showDropIndicator('pool', 0)"></div>
    <div
      class="card"
      *ngFor="let card of filteredPoolCards; trackBy: trackById"
      draggable="true"
      (dragstart)="onCardDragStart($event, 'pool', card.id)"
      (dragend)="onCardDragEnd()"
      (mousedown)="onCardMouseDown()"
      (mouseup)="onCardMouseUp()"
      (mouseenter)="onCardMouseEnter($event, card)"
      (mousemove)="onCardMouseMove($event)"
      (mouseleave)="onCardMouseLeave()"
      (dragover)="onCardDragOver($event, 'pool', card.id)"
      (drop)="dropOnPool($event)">
      <img *ngIf="card.imageUrl" [src]="card.imageUrl" [alt]="card.name" loading="lazy" />
      <span>{{ card.name }}</span>
    </div>
    <div class="drop-indicator" *ngIf="showDropIndicator('pool', poolCards.length)"></div>
  </div>

  <div
    class="card-tooltip"
    *ngIf="tooltipCard"
    [style.left.px]="tooltipPosition.x"
    [style.top.px]="tooltipPosition.y">
    <img [src]="tooltipCard.previewImageUrl || tooltipCard.imageUrl" [alt]="tooltipCard.name" />
  </div>
</div>
